name: medipipe_ml
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - numpy>=1.24,<2.0
  - pandas>=2.0,<3.0
  - scipy>=1.10,<2.0
  
  # Machine Learning
  - scikit-learn>=1.3,<1.6
  - xgboost>=1.7,<3.0
  - lightgbm>=4.0,<5.0
  - imbalanced-learn>=0.11,<0.13
  
  # Feature selection and preprocessing
  - boruta_py
  - shap>=0.42,<0.50
  
  # Visualization
  - matplotlib>=3.7,<4.0
  - seaborn>=0.12,<1.0
  - plotly>=5.15,<6.0
  
  # Model persistence
  - joblib
  
  # Bioinformatics tools for ML discrimination workflow
  - deeptools>=3.5,<4.0
  - bedtools>=2.30,<3.0
  - pysam>=0.21,<1.0
  - pybigwig>=0.3,<1.0
  
  # Utilities
  - pyyaml
  - tqdm
  - click
